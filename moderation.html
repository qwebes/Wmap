<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модерація запитів</title>
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <link rel="stylesheet" href="/css/mod-style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div class="main-content-column">
    <header class="header">
        <a href="/" class="back-link">
            <img src="/icons/Vector (21).svg" alt="Arrow">
            Повернутись
        </a>
    </header>

    <h1>Модерація запитів</h1>

    <section class="requests-section">
        <h2>Нові <span id="pending-count">(…)</span></h2>
        
        <div class="request-list" id="request-list"></div>
    </section>
</div>

<section class="map-section">
    <div class="map-wrapper">
        <div id="map"></div>
        <div class="map-controls">
            <button class="control-btn" aria-label="Місцезнаходження">
                <img src="/icons/akar-icons_check-in.svg" alt="location">
            </button>
            <button id="btn-zoom-in" class="control-btn" aria-label="Збільшити">
                <img src="/icons/ri_add-large-line.svg" alt="zoom in">
            </button>
            <button id="btn-zoom-out" class="control-btn" aria-label="Зменшити">
                <img src="/icons/Rectangle 43.svg" alt="zoom out">
            </button>
        </div>
    </div>
</section>

<script src="/js/auth-helper.js"></script>
<script src="/js/moderation.js"></script>
</body>
</html>
