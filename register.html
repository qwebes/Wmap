<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація акаунту</title>
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <link rel="stylesheet" href="/css/reg-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<main class="registration-container">
    <img src="/icons/logo.svg" alt="Wmap Logo" class="logo">

    <h1>Вітаємо у Wmap!</h1>
    <h2>Реєстрація акаунту</h2>

    <form action="/register" method="POST">
        <div class="input-group">
            <input type="email" id="email" name="email" placeholder="email@example.com" required>
        </div>
        <div class="input-group">
            <input type="text" id="nickname" name="nickname" placeholder="Ім'я користувача" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" name="password" placeholder="Пароль" required>
            <img src="/icons/Vector (10).svg" class="eye-icon-inside" alt="toggle">
        </div>
        <div class="input-group">
            <input type="password" id="password_confirm" name="password_confirm" placeholder="Пароль ще раз" required>
            <img src="/icons/Vector (10).svg" class="eye-icon-inside" alt="toggle">
        </div>

        <button type="submit" class="btn-register">Створити акаунт</button>
    </form>

    <div class="social-login">
        <a href="#" class="social-icon">
            <img src="/icons/google-logo.svg" alt="Google">
        </a>
        <a href="#" class="social-icon">
            <img src="/icons/apple-logo.svg" alt="Apple">
        </a>
        <a href="#" class="social-icon">
            <img src="/icons/meta-logo.svg" alt="Meta">
        </a>
    </div>

    <p class="sign-in-link">
        Вже маєш акаунт? <a href="login">Увійти</a>
    </p>
</main>

<script src="/js/auth-helper.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/register.js"></script>

</body>
</html>
